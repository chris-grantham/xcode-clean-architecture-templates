<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <!-- Background: rounded square, Presentation layer purple -->
  <rect width="96" height="96" rx="20" ry="20" fill="#AF52DE"/>

  <!-- Screen / view rectangle -->
  <rect x="14" y="20" width="68" height="46" rx="7" ry="7"
        fill="none" stroke="white" stroke-width="5"/>

  <!-- ViewModel state lines (observable properties) -->
  <line x1="26" y1="36" x2="54" y2="36" stroke="white" stroke-width="4"
        stroke-linecap="round"/>
  <line x1="26" y1="48" x2="46" y2="48" stroke="white" stroke-width="4"
        stroke-linecap="round"/>

  <!-- @Observable badge: small circle with @ -->
  <circle cx="68" cy="36" r="10" fill="white"/>
  <text x="68" y="40" font-family="Helvetica Neue, sans-serif" font-size="12"
        font-weight="700" fill="#AF52DE" text-anchor="middle">@</text>

  <!-- Bottom tab indicator -->
  <line x1="38" y1="74" x2="58" y2="74" stroke="white" stroke-width="5"
        stroke-linecap="round"/>
</svg>
