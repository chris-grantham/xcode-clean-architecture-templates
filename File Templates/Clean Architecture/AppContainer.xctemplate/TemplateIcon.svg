<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <!-- Background: rounded square, Application layer blue -->
  <rect width="96" height="96" rx="20" ry="20" fill="#007AFF"/>

  <!-- Container symbol: outer box representing the DI container -->
  <rect x="16" y="24" width="64" height="48" rx="8" ry="8"
        fill="none" stroke="white" stroke-width="5" stroke-linejoin="round"/>

  <!-- Three stacked dependency dots -->
  <circle cx="36" cy="40" r="5" fill="white"/>
  <circle cx="36" cy="56" r="5" fill="white"/>

  <!-- Factory arrow pointing right from the dots -->
  <line x1="46" y1="40" x2="68" y2="40" stroke="white" stroke-width="4"
        stroke-linecap="round"/>
  <polyline points="62,34 68,40 62,46" fill="none" stroke="white" stroke-width="4"
            stroke-linecap="round" stroke-linejoin="round"/>

  <line x1="46" y1="56" x2="68" y2="56" stroke="white" stroke-width="4"
        stroke-linecap="round"/>
  <polyline points="62,50 68,56 62,62" fill="none" stroke="white" stroke-width="4"
            stroke-linecap="round" stroke-linejoin="round"/>
</svg>
