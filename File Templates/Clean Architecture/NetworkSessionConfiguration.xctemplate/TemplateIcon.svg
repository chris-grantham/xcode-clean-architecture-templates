<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <!-- Background: rounded square, Data/Infrastructure layer green -->
  <rect width="96" height="96" rx="20" ry="20" fill="#30D158"/>

  <!-- Document outline -->
  <path d="M 22 16 L 62 16 L 74 28 L 74 80 L 22 80 Z"
        fill="none" stroke="white" stroke-width="4.5"
        stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Folded corner -->
  <polyline points="62,16 62,28 74,28" fill="none" stroke="white" stroke-width="4"
            stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Config key-value lines -->
  <!-- baseURL -->
  <line x1="32" y1="42" x2="44" y2="42" stroke="white" stroke-width="3"
        stroke-linecap="round" opacity="0.7"/>
  <line x1="48" y1="42" x2="64" y2="42" stroke="white" stroke-width="3"
        stroke-linecap="round"/>

  <!-- timeout -->
  <line x1="32" y1="52" x2="44" y2="52" stroke="white" stroke-width="3"
        stroke-linecap="round" opacity="0.7"/>
  <line x1="48" y1="52" x2="60" y2="52" stroke="white" stroke-width="3"
        stroke-linecap="round"/>

  <!-- headers -->
  <line x1="32" y1="62" x2="44" y2="62" stroke="white" stroke-width="3"
        stroke-linecap="round" opacity="0.7"/>
  <line x1="48" y1="62" x2="64" y2="62" stroke="white" stroke-width="3"
        stroke-linecap="round"/>
</svg>
