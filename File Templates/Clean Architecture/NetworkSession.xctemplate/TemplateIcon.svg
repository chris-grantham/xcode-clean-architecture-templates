<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <!-- Background: rounded square, Data/Infrastructure layer green -->
  <rect width="96" height="96" rx="20" ry="20" fill="#30D158"/>

  <!-- Globe outline suggesting network -->
  <circle cx="48" cy="46" r="26" fill="none" stroke="white" stroke-width="4.5"/>

  <!-- Horizontal equator -->
  <line x1="22" y1="46" x2="74" y2="46" stroke="white" stroke-width="3.5"
        stroke-linecap="round"/>

  <!-- Vertical meridian -->
  <line x1="48" y1="20" x2="48" y2="72" stroke="white" stroke-width="3.5"
        stroke-linecap="round"/>

  <!-- Elliptical latitude curves (top and bottom halves) -->
  <path d="M 22 46 Q 48 28 74 46" fill="none" stroke="white" stroke-width="3"
        stroke-linecap="round"/>
  <path d="M 22 46 Q 48 64 74 46" fill="none" stroke="white" stroke-width="3"
        stroke-linecap="round"/>

  <!-- Upward arrow: async/await data flow -->
  <polyline points="42,18 48,11 54,18" fill="none" stroke="white" stroke-width="4"
            stroke-linecap="round" stroke-linejoin="round"/>
</svg>
